name: Test Tab Mirror Extension

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '18'

    - name: Install Firefox
      uses: browser-actions/setup-firefox@v1
      with:
        firefox-version: latest

    - name: Verify Firefox and geckodriver
      run: |
        which firefox
        firefox --version
        npx geckodriver --version

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test
      env:
        HEADLESS: '1'
